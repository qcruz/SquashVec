<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Governance — Strategy Card Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <header id="header">
    <div>
      <div class="game-title">Governance</div>
      <div class="game-subtitle">Solo Mode · Build Your Civilization</div>
    </div>
    <div id="deck-count">—</div>
  </header>

  <div id="main">

    <!-- Left column: categories on top, hand on bottom -->
    <div id="left-col">
      <div id="categories"><!-- rendered by game.js --></div>
      <div id="hand-area">
        <div id="hand-label"></div>
        <div id="hand"><!-- rendered by game.js --></div>
      </div>
    </div>

    <!-- Right panel: full height — log top, card detail bottom -->
    <aside id="right-panel">
      <div id="log-section">
        <div class="panel-title">Game Log</div>
        <div id="log"><!-- rendered by game.js --></div>
      </div>
      <div id="card-detail">
        <div class="panel-title">Card Detail</div>
        <div id="card-detail-body">
          <div class="detail-empty">Click any card to inspect it here.</div>
        </div>
        <div id="card-detail-actions"></div>
      </div>
    </aside>

  </div>
</div>

<div id="modal-overlay" class="hidden">
  <div id="modal-content"></div>
</div>

<script src="js/cards.js"></script>
<script src="js/game.js"></script>
</body>
</html>
