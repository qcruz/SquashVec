<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Governance — Strategy Card Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <div>
      <div class="game-title">Governance</div>
      <div class="game-subtitle">Solo Mode · Build Your Civilization</div>
    </div>
    <div id="deck-count">Deck: — | Discard: —</div>
  </header>

  <!-- Main: categories + right panel -->
  <div id="main">
    <div id="categories">
      <!-- rendered by game.js -->
    </div>

    <aside id="right-panel">
      <!-- Game Log (top) -->
      <div id="log-section">
        <div class="panel-title">Game Log</div>
        <div id="log"><!-- rendered by game.js --></div>
      </div>

      <!-- Card Detail (bottom) -->
      <div id="card-detail">
        <div class="panel-title">Selected Card</div>
        <div id="card-detail-body">
          <div class="detail-empty">Click a card in your hand to inspect it.</div>
        </div>
      </div>
    </aside>
  </div>

  <!-- Hand -->
  <div id="hand-area">
    <div id="hand-label"></div>
    <div id="hand">
      <!-- rendered by game.js -->
    </div>
  </div>

</div>

<!-- Modal overlay (post-play choices only) -->
<div id="modal-overlay" class="hidden">
  <div id="modal-content">
    <!-- injected by game.js -->
  </div>
</div>

<script src="js/cards.js"></script>
<script src="js/game.js"></script>
</body>
</html>
